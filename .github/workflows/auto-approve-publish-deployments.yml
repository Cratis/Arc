name: Auto-Approve Publish Deployments
# Workflow that automatically approves pending environment deployments (npm/nuget)
# from publish workflows, intended for trusted publishing flows.

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]

permissions:
  actions: read
  deployments: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve pending npm/nuget deployments
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          TARGET_REPO: ${{ github.event.workflow_run.repository.full_name }}
        run: |
          set -euo pipefail

          max_attempts=180
          sleep_seconds=10

          for ((attempt=1; attempt<=max_attempts; attempt++)); do
            mapfile -t env_ids < <(
              gh api "repos/${TARGET_REPO}/actions/runs/${WORKFLOW_RUN_ID}/pending_deployments" \
                --jq '.[] | select(.environment.name == "npm" or .environment.name == "nuget") | .environment.id' |
                sort -u
            )

            if [ "${#env_ids[@]}" -gt 0 ]; then
              args=()
              for env_id in "${env_ids[@]}"; do
                args+=(-F "environment_ids[]=${env_id}")
              done

              gh api -X POST "repos/${TARGET_REPO}/actions/runs/${WORKFLOW_RUN_ID}/pending_deployments" \
                "${args[@]}" \
                -f state=approved \
                -f comment='Auto-approved for trusted publishing'

              echo "Approved pending deployments for environments: ${env_ids[*]}"
              exit 0
            fi

            run_status=$(gh api "repos/${TARGET_REPO}/actions/runs/${WORKFLOW_RUN_ID}" --jq '.status')
            if [ "$run_status" = "completed" ]; then
              echo "No pending npm/nuget deployments found for run ${WORKFLOW_RUN_ID}"
              exit 0
            fi

            echo "Attempt ${attempt}/${max_attempts}: no pending npm/nuget deployments yet for run ${WORKFLOW_RUN_ID}; run status is ${run_status}. Waiting ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for pending npm/nuget deployments for run ${WORKFLOW_RUN_ID}"
          exit 1
