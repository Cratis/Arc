name: .NET Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET8_VERSION: "8.0.407"
  DOTNET9_VERSION: "9.0.x"
  DOTNET10_VERSION: "10.0.x"
  DOTNET_BIN_CACHE: "dotnet-bin-${{ github.sha }}"

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
  pull_request:
    branches:
      - "**"
    paths:
      - "Source/DotNET/**"
      - "Specifications/**"

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    outputs:
      proxy-namespaces: ${{ steps.discover-namespaces.outputs.namespaces }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover ProxyGenerator spec namespaces
        id: discover-namespaces
        run: |
          namespaces=$(grep -rh "^namespace " Source/DotNET/Tools/ProxyGenerator.Specs --include="*.cs" \
            | sed 's/^namespace //; s/;//' \
            | awk -F. '{
                for (i=1; i<=NF; i++) {
                  if ($i ~ /^for_/) {
                    r=$1; for (j=2; j<=i; j++) r=r"."$j
                    print r
                    break
                  }
                }
              }' \
            | sort -u \
            | jq -Rc '.' \
            | jq -sc '.')
          echo "namespaces=$namespaces" >> "$GITHUB_OUTPUT"

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET10_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', '**/Directory.*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore obj cache
        uses: actions/cache@v4
        with:
          path: ./**/obj
          key: dotnet-obj-${{ github.sha }}
          restore-keys: |
            dotnet-obj-

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_BIN_CACHE }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 23.x
          registry-url: "https://registry.npmjs.org"

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            .yarn/cache
            **/node_modules
            **/.eslintcache
            **/yarn.lock
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json') }}

      - name: Yarn install
        run: yarn

      - name: Build
        run: dotnet build --configuration Release

  specs:
    needs: [dotnet-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET10_VERSION }}

      - name: Restore build output
        uses: actions/cache@v4
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_BIN_CACHE }}

      - name: Test
        run: dotnet test --no-build --configuration Release --framework net10.0 --filter "FullyQualifiedName!~Cratis.Arc.ProxyGenerator"

  proxy-specs:
    needs: [dotnet-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        namespace: ${{ fromJson(needs.dotnet-build.outputs.proxy-namespaces) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET10_VERSION }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 23.x
          registry-url: "https://registry.npmjs.org"

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            .yarn/cache
            **/node_modules
            **/.eslintcache
            **/yarn.lock
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json') }}

      - name: Yarn install
        run: yarn

      - name: Restore build output
        uses: actions/cache@v4
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_BIN_CACHE }}

      - name: Test (${{ matrix.namespace }})
        run: |
          dotnet test Source/DotNET/Tools/ProxyGenerator.Specs \
            --no-build \
            --configuration Release \
            --framework net10.0 \
            --filter "FullyQualifiedName~${{ matrix.namespace }}" \
            --logger "console;verbosity=normal"
